<!DOCTYPE html>
<html>

<head lang="en">
    <title>Prayer Time Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    <script src="countries.js"></script>
    <script src="offset-controls.js"></script>
    <script src="test-signal.js"></script>
    <style>
        .offset-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .offset-controls button {
            padding: 4px 8px;
            font-size: 12px;
            color: #f2f2f2;
            background: #2b2b2b;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
        }

        .offset-controls button:hover {
            background: #343434;
        }

        .offset-controls button:active {
            background: #1f1f1f;
        }

        .offset-controls sdpi-textfield {
            min-width: 72px;
        }

        .test-signal button {
            padding: 4px 10px;
            font-size: 12px;
            color: #f2f2f2;
            background: #2b2b2b;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
        }

        .test-signal button:hover {
            background: #343434;
        }

        .test-signal button:active {
            background: #1f1f1f;
        }
    </style>
</head>

<body>
    <!--
        These settings are persisted as "action settings" and delivered to the plugin as
        payload.settings. The plugin uses them to call the prayer times API.
        Documentation for the components: https://sdpi-components.dev/docs/components
    -->
    <sdpi-item label="City">
        <sdpi-textfield setting="city" placeholder="e.g., London"></sdpi-textfield>
    </sdpi-item>

    <sdpi-item label="Country">
        <sdpi-select id="countrySelect" setting="country" default="Saudi Arabia"></sdpi-select>
    </sdpi-item>

    <sdpi-item label="Prayer">
        <sdpi-select setting="prayer" default="Fajr">
            <option value="Fajr">Fajr</option>
            <option value="Dhuhr">Dhuhr</option>
            <option value="Asr">Asr</option>
            <option value="Maghrib">Maghrib</option>
            <option value="Isha">Isha</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Method">
        <sdpi-select setting="method" default="4">
            <option value="0">Shia Ithna-Ashari</option>
            <option value="1">University of Islamic Sciences, Karachi</option>
            <option value="2">Islamic Society of North America</option>
            <option value="3">Muslim World League</option>
            <option value="4">Umm al-Qura University, Makkah</option>
            <option value="5">Egyptian General Authority of Survey</option>
            <option value="7">Institute of Geophysics, Univ. of Tehran</option>
            <option value="8">Gulf Region</option>
            <option value="9">Kuwait</option>
            <option value="10">Qatar</option>
            <option value="11">Majlis Ugama Islam Singapura</option>
            <option value="12">Union Organization islamic de France</option>
            <option value="13">Diyanet Isleri Baskanligi, Turkey</option>
            <option value="14">Spiritual Administration of Muslims of Russia</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Madhab">
        <sdpi-select setting="madhab" default="0">
            <option value="0">Shafi (Standard)</option>
            <option value="1">Hanafi</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Time Format">
        <sdpi-select setting="timeFormat" default="24h">
            <option value="24h">24-hour</option>
            <option value="12h">12-hour</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Show Prayer Name">
        <sdpi-checkbox setting="showPrayerName" default="true"></sdpi-checkbox>
    </sdpi-item>

    <sdpi-item label="Enable Notifications">
        <sdpi-checkbox setting="notificationsEnabled" default="true"></sdpi-checkbox>
    </sdpi-item>

    <sdpi-item label="Refresh (minutes)">
        <sdpi-range setting="refreshMinutes" min="1" max="60" step="1" default="10" showlabels></sdpi-range>
    </sdpi-item>

    <sdpi-item label="Offset (minutes)">
        <div class="offset-controls">
            <button type="button" id="offsetMinus">-5</button>
            <sdpi-textfield id="offsetInput" setting="offsetMinutes" placeholder="0"></sdpi-textfield>
            <button type="button" id="offsetPlus">+5</button>
            <button type="button" id="offsetReset">Reset</button>
        </div>
    </sdpi-item>

    <sdpi-item label="Signal Duration (seconds)">
        <sdpi-range setting="signalDurationSeconds" min="5" max="60" step="1" default="10" showlabels></sdpi-range>
    </sdpi-item>

    <sdpi-item label="Preview Alert">
        <div class="test-signal">
            <button type="button" id="testSignalButton">Preview Blink</button>
            <sdpi-textfield id="testSignalField" setting="testSignal" style="display:none"></sdpi-textfield>
        </div>
    </sdpi-item>
</body>

</html>
